[project]
name = "fever"
version = "0.1.0"
description = "A very capable and fully transparent live debugging and hot-reloading system."
readme = "README.md"
authors = [
    { name = "Theo", email = "theo.morales.fr@gmail.com" }
]
requires-python = ">=3.13"
dependencies = ["networkx", "matplotlib"]

[build-system]
requires = ["uv_build>=0.8.23,<0.9.0"]
build-backend = "uv_build"
